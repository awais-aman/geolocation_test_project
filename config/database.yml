# PostgreSQL configuration per environment.
# Optional ENV overrides: DATABASE_HOST, DATABASE_PORT, DATABASE_USERNAME,
# DATABASE_PASSWORD, DATABASE_NAME, DATABASE_URL (overrides entire config).

default: &default
  adapter: postgresql
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "postgres") %>
  pool: <%= ENV.fetch("DATABASE_POOL", 5) %>
  # Used by rake db:create — must be an existing PostgreSQL database
  maintenance_database: <%= ENV.fetch("DATABASE_MAINTENANCE_DB", "postgres") %>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "geolocation_api_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "geolocation_api_test") %>

production:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "geolocation_api_production") %>
  url: <%= ENV["DATABASE_URL"] %>
